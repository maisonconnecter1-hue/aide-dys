<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aide à l'écriture - Super Championne</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/dist/opendyslexic.min.css">

  <style>
    body {
      font-family: 'OpenDyslexic', sans-serif;
      background: linear-gradient(135deg, #2b1055, #7597de);
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    header {
      width: 100%;
      padding: 15px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.15);
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 20px;
      background-color: #6c5ce7;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s;
      font-family: 'OpenDyslexic', sans-serif;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }

    button:active { transform: scale(0.95); }
    button:hover { background-color: #a29bfe; }

    .btn-listen-ia { background-color: #fd79a8; }
    .btn-listen-ia:hover { background-color: #fab1a0; }

    #editor-container {
      width: 90%;
      max-width: 850px;
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      padding-bottom: 50px;
    }

    /* Zone Défi d'origine : Propre et sans boîte grise */
    #challenge-zone {
      width: 100%;
    }

    #progress-container {
      width: 100%;
      background-color: rgba(255, 255, 255, 0.2);
      height: 22px;
      border-radius: 12px;
      margin: 15px 0;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00cec9, #00b894);
      width: 0%;
      transition: width 0.5s ease;
    }

    #prompt-box {
      font-size: 22px;
      line-height: 1.5;
      color: #ffffff;
      margin: 10px 0;
      border-left: 4px solid #fdcb6e;
      padding-left: 15px;
    }

    #input-text {
      width: 100%;
      height: 140px;
      font-size: 24px;
      font-family: 'OpenDyslexic', sans-serif;
      padding: 15px;
      border: 3px solid #fdcb6e;
      border-radius: 15px;
      background-color: white;
      color: #2d3436;
      box-sizing: border-box;
    }

    #output-display {
      width: 100%;
      min-height: 110px;
      background-color: white;
      color: #2d3436;
      border-radius: 15px;
      padding: 15px;
      font-size: 24px;
      line-height: 1.8;
      white-space: pre-wrap;
      box-sizing: border-box;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.15);
    }

    .syl1 { color: #0984e3; font-weight: bold; text-decoration: underline; }
    .syl2 { color: #d63031; font-weight: bold; }

    .word-correct { color: #00b894; font-weight: bold; }
    .word-wrong { color: #d63031; font-weight: bold; border-bottom: 2px dashed #d63031; }

    .btn-validate {
      background-color: #00b894;
      font-size: 22px;
      padding: 15px;
      width: 100%;
      border-radius: 15px;
    }
    .btn-validate:hover { background-color: #00cec9; }

    /* Fenêtre cadeau originale */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      border: 3px solid #fdcb6e;
    }
  </style>
</head>
<body>

  <header>
    <button onclick="lireTexte()" style="background:#00b894">🔊 Écouter</button>
    <button onclick="verifierLectureIA()" class="btn-listen-ia">🤖 L'IA m'écoute</button>
    <button onclick="changerTaille(2)">➕ Agrandir</button>
    <button onclick="changerTaille(-2)">➖ Réduire</button>
    <button onclick="resetScore()" style="background:#d63031">✨ Recommencer</button>
  </header>

  <div id="editor-container">
    
    <section id="challenge-zone">
      <div style="font-size: 24px; font-weight: bold;">⭐ Victoires : <span id="score-value">0</span> / 30</div>
      <div id="progress-container">
        <div id="progress-fill"></div>
      </div>
      <p id="prompt-box"></p>
    </section>

    <textarea id="input-text" placeholder="Écris ton texte ici..." oninput="decouperSyllabes()"></textarea>
    
    <div id="output-display">L'aperçu en couleur s'affichera ici...</div>
    
    <button class="btn-validate" onclick="validerExercice()">🚀 Valider l'exercice</button>
  </div>

  <div id="gift-modal" class="modal">
    <div class="modal-content">
      <h2>🎁 BRAVO TU AS GAGNÉ ! 🎁</h2>
      <p>Tu as atteint les 30 victoires ! Choisis ton cadeau :</p>
      <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px;">
        <button onclick="choisirCadeau('un Produit de Beauté')" style="background:#fd79a8; color:white;">💄 Beauté</button>
        <button onclick="choisirCadeau('une Sortie')" style="background:#f1c40f; color:black;">🎢 Sortie</button>
        <button onclick="choisirCadeau('une Surprise')" style="background:#0984e3; color:white;">✨ Surprise</button>
      </div>
      <p id="choix-final" style="margin-top: 25px; color: #fdcb6e; font-weight: bold; font-size: 24px;"></p>
      <button onclick="fermerModal()" style="margin-top: 20px; background: #2d3436; width: 100%;">Fermer</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <script>
    let score = localStorage.getItem('dys_story_score') ? parseInt(localStorage.getItem('dys_story_score')) : 0;
    let histoireComplete = localStorage.getItem('dys_story_text') ? localStorage.getItem('dys_story_text') : "";

    // Banques d'histoires fluides pour la suite automatique
    const heros = ["Un petit lapin astronaute", "Une princesse de la Lune", "Un chaton avec un casque spatial", "Un robot rigolo", "Une étoile filante"];
    const actions = ["découvre une nouvelle planète", "répare sa fusée de l'espace", "trouve une comète magique", "rencontre un extraterrestre", "regarde les anneaux de Saturne"];
    const lieux = ["dans la Voie Lactée.", "sur une planète en chocolat.", "dans une station secrète.", "derrière une étoile.", "tout près du Soleil."];
    const suites = [
      "Soudain, une météorite brillante passe juste à côté.",
      "Heureusement, la fusée avance très vite dans l'espace.",
      "Une lueur magique commence alors à briller au loin.",
      "C'est le début d'une très grande aventure cosmique.",
      "Le voyage continue avec beaucoup de joie."
    ];

    window.onload = () => {
      actualiserInterface();
      genererNouvelleEtape();
    };

    function actualiserInterface() {
      document.getElementById('score-value').textContent = score;
      const pourcentage = (Math.min(score, 30) / 30) * 100;
      document.getElementById('progress-fill').style.width = pourcentage + "%";
      localStorage.setItem('dys_story_score', score);
    }

    function genererNouvelleEtape() {
      if (!histoireComplete) {
        const h = heros[Math.floor(Math.random() * heros.length)];
        const a = actions[Math.floor(Math.random() * actions.length)];
        const l = lieux[Math.floor(Math.random() * lieux.length)];
        document.getElementById('prompt-box').innerHTML = `<b>Modèle à copier :</b> "${h} ${a} ${l}"`;
      } else {
        const s = suites[Math.floor(Math.random() * suites.length)];
        document.getElementById('prompt-box').innerHTML = `<b>Mission de la suite :</b> "${s}"`;
      }
    }

    function decouperSyllabes() {
      const text = document.getElementById('input-text').value;
      if (!text.trim()) {
        document.getElementById('output-display').innerHTML = "L'aperçu en couleur s'affichera ici...";
        return;
      }
      const words = text.split(/(\s+)/);
      const colored = words.map(word => {
        if (word.trim() === "") return word;
        let syllables = word.match(/[^aeiouyàâéèêëîïôûù]*[aeiouyàâéèêëîïôûù]+(?:[^aeiouyàâéèêëîïôûù](?![aeiouyàâéèêëîïôûù]))*/gi) || [word];
        return syllables.map((s, i) => `<span class="syl${(i % 2) + 1}">${s}</span>`).join('');
      }).join('');
      
      document.getElementById('output-display').innerHTML = colored;
    }

    // IA Correction vocale : Modifie directement l'aperçu du bas sans créer de bloc
    function verifierLectureIA() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("L'analyse vocale n'est pas disponible ici. Utilise Chrome ou Safari.");
        return;
      }

      const texteAttendu = document.getElementById('input-text').value.trim();
      if (!texteAttendu) {
        alert("Écris d'abord ton texte avant de le lire !");
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = 'fr-FR';

      const btn = document.querySelector('.btn-listen-ia');
      btn.textContent = "👂 L'IA t'écoute...";

      recognition.onresult = (event) => {
        const vocal = event.results[0][0].transcript.toLowerCase();
        const epurer = (t) => t.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/).filter(Boolean);
        
        const motsOriginaux = epurer(texteAttendu);
        const motsVocals = epurer(vocal);
        
        let resultatHTML = "";
        let fautes = 0;

        motsOriginaux.forEach(mot => {
          if (motsVocals.includes(mot)) {
            resultatHTML += `<span class="word-correct">${mot}</span> `;
          } else {
            resultatHTML += `<span class="word-wrong" title="À relire">${mot}</span> `;
            fautes++;
          }
        });

        document.getElementById('output-display').innerHTML = resultatHTML;
        if (fautes === 0) {
          confetti({ particleCount: 30, spread: 40 });
        }
      };

      recognition.onend = () => { btn.textContent = "🤖 L'IA m'écoute"; };
      recognition.start();
    }

    function validerExercice() {
      const inputZone = document.getElementById('input-text');
      const texteSaisi = inputZone.value.trim();

      if (texteSaisi.length < 5) {
        alert("Écris ta phrase avant de valider !");
        return;
      }

      histoireComplete += " " + texteSaisi;
      score++;
      localStorage.setItem('dys_story_text', histoireComplete);
      
      actualiserInterface();
      confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });

      if (score >= 30) {
        setTimeout(() => { document.getElementById('gift-modal').style.display = 'flex'; }, 500);
      }

      inputZone.value = "";
      document.getElementById('output-display').innerHTML = "L'aperçu en couleur s'affichera ici...";
      genererNouvelleEtape();
    }

    function lireTexte() {
      const text = document.getElementById('input-text').value;
      if (!text) return;
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'fr-FR';
      msg.rate = 0.8; 
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(msg);
    }

    function choisirCadeau(cadeau) {
      document.getElementById('choix-final').innerHTML = `Gagné ! Tu as choisi : <br><b>${cadeau}</b> ! 🏆`;
      confetti({ particleCount: 200, spread: 100 });
    }

    function fermerModal() {
      document.getElementById('gift-modal').style.display = 'none';
    }

    function resetScore() {
      if (confirm("Veux-tu remettre le score à zéro et recommencer ?")) {
        score = 0;
        histoireComplete = "";
        localStorage.removeItem('dys_story_text');
        document.getElementById('input-text').value = "";
        document.getElementById('choix-final').textContent = "";
        actualiserInterface();
        genererNouvelleEtape();
      }
    }

    function changerTaille(n) {
      const elements = [document.getElementById('input-text'), document.getElementById('output-display')];
      elements.forEach(el => {
        let current = parseInt(window.getComputedStyle(el).fontSize);
        let next = current + n;
        if(next >= 16 && next <= 46) el.style.fontSize = next + "px";
      });
    }
  </script>
</body>
</html>
