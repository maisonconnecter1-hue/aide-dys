<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Espace Écriture - Méline (réaliste)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/dist/opendyslexic.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Andika&family=Lexend&family=Comic+Neue&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'OpenDyslexic', sans-serif;
            background: #000;
            color: #f0f3ff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        /* Vidéo de fond réaliste (NASA / Hubble style) */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
            filter: brightness(0.9) contrast(1.1);
        }
        /* Couche d'overlay pour les étoiles filantes et planètes supplémentaires */
        #overlay-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .app-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .tabs {
            display: flex;
            background: rgba(5,10,30,0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,215,0,0.4);
            padding: 0 20px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-button {
            background: rgba(0,0,0,0.5);
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            color: #c9e9ff;
            cursor: pointer;
            border-radius: 30px 30px 15px 15px;
            transition: 0.3s;
        }
        .tab-button.active {
            background: #2c3e66cc;
            color: #ffecb3;
            border-bottom: 3px solid #f1c40f;
            box-shadow: 0 0 15px rgba(241,196,15,0.6);
        }
        .tab-content { display: none; flex-grow: 1; padding: 20px; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .toolbar {
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            border-top: 1px solid rgba(255,255,200,0.2);
        }
        .editor-container { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; align-items: center; padding: 20px; }
        .zone { width: 85%; max-width: 1000px; }
        textarea, .dict-input, .story-keywords {
            width: 100%;
            font-size: 24px;
            font-family: inherit;
            padding: 20px;
            border: 2px solid #4ecdc4;
            border-radius: 30px;
            line-height: 1.6;
            background: rgba(15,25,55,0.8);
            backdrop-filter: blur(4px);
            color: #f5f9ff;
            resize: vertical;
        }
        button {
            padding: 10px 24px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #1f3a5f, #0f1a2f);
            color: white;
            font-family: inherit;
            font-weight: bold;
            transition: 0.2s;
            border: 1px solid rgba(255,215,0,0.5);
        }
        button:hover { transform: scale(1.02); background: linear-gradient(135deg, #2c4a7a, #1a2a4a); box-shadow: 0 0 15px gold; }
        .correct-char { color: #2ecc71; text-shadow: 0 0 5px #27ae60; }
        .incorrect-char { color: #e74c3c; text-shadow: 0 0 3px #c0392b; }
        .colored-dict-output { background: rgba(10,20,45,0.8); backdrop-filter: blur(8px); border-radius: 30px; padding: 20px; font-size: 28px; line-height: 1.8; border: 1px solid #4ecdc4; margin-top: 10px; cursor: pointer; }
        .hint-box { background: #1e2a4acc; border-radius: 20px; padding: 15px; margin-top: 15px; border-left: 5px solid #f1c40f; backdrop-filter: blur(8px); }
        .badge { display: inline-block; font-size: 2rem; margin: 5px; cursor: pointer; transition: 0.2s; }
        .badge.selected { transform: scale(1.2); filter: drop-shadow(0 0 8px gold); }
        .speed-control { margin: 10px 0; display: flex; gap: 10px; align-items: center; }
        .mouth-animation { width: 60px; height: 60px; background: url('data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 100 100\"><circle cx=\"50\" cy=\"50\" r=\"45\" fill=\"%23f5cba0\"/><ellipse cx=\"35\" cy=\"40\" rx=\"6\" ry=\"8\" fill=\"white\"/><ellipse cx=\"65\" cy=\"40\" rx=\"6\" ry=\"8\" fill=\"white\"/><ellipse cx=\"35\" cy=\"40\" rx=\"3\" ry=\"5\" fill=\"black\"/><ellipse cx=\"65\" cy=\"40\" rx=\"3\" ry=\"5\" fill=\"black\"/><ellipse cx=\"50\" cy=\"65\" rx=\"15\" ry=\"8\" fill=\"%23993333\" id=\"mouth\"/></svg>') no-repeat center/contain; margin: 0 auto; }
        @keyframes speak { 0% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } 100% { transform: scaleY(1); } }
        .speaking .mouth-animation { animation: speak 0.3s infinite; }
        footer { text-align: center; font-size: 14px; padding: 8px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); border-top: 1px solid #2c3e66; }
        @media (max-width: 700px) { .zone { width: 95%; } textarea, .colored-dict-output { font-size: 20px; } button { padding: 6px 12px; font-size: 12px; } }
    </style>
</head>
<body>
<!-- Vidéo de fond réaliste (NASA / Hubble) - libre de droits -->
<video id="bg-video" autoplay loop muted playsinline>
    <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-space-1247-large.mp4" type="video/mp4">
    <!-- Fallback : si la vidéo ne charge pas, afficher un dégradé spatial -->
</video>
<canvas id="overlay-canvas"></canvas>
<div class="app-container">
    <div class="tabs">
        <button class="tab-button active" data-tab="ecriture">🚀 Écriture libre</button>
        <button class="tab-button" data-tab="histoire">🌌 Histoire interactive</button>
        <button class="tab-button" data-tab="dictee">🛸 Dictée vocale</button>
        <button class="tab-button" data-tab="progres">📊 Mes progrès</button>
        <button class="tab-button" data-tab="settings">⚙️ Réglages</button>
        <button class="tab-button" data-tab="badges">🏅 Mes badges</button>
    </div>

    <!-- Écriture libre -->
    <div id="ecriture" class="tab-content active">
        <div class="editor-container">
            <div class="zone"><textarea id="input-text" placeholder="Écris ton histoire, Méline..."></textarea></div>
            <div class="zone"><div id="output-display" style="min-height:120px; background:rgba(10,20,45,0.8); backdrop-filter:blur(8px); border-radius:30px; padding:20px; cursor:pointer;"></div></div>
            <div class="toolbar">
                <button onclick="insererPhraseAleatoire()">🌟 Phrase au hasard</button>
                <button onclick="colorerSyllabes()">🎨 Colorer syllabes</button>
                <button onclick="lireMotSelectionne()">🔊 Lire mot sélectionné</button>
                <button onclick="changerTaille(2)">🔭 Agrandir</button>
                <button onclick="changerTaille(-2)">🔭 Réduire</button>
                <button onclick="reinitialiserAffichage()">🪐 Texte brut</button>
                <button onclick="relectureGuidee()">🧠 Relecture guidée</button>
                <button onclick="suggererCorrections()">📝 Suggérer corrections</button>
            </div>
        </div>
    </div>

    <!-- Histoire interactive -->
    <div id="histoire" class="tab-content">
        <div class="editor-container">
            <div class="zone">
                <label>📝 Entre tes mots-clés :</label>
                <input type="text" id="storyKeywords" class="story-keywords" placeholder="ex: supernova, galaxie" value="aventure">
                <button id="generateStoryBtn">✨ Générer 3 phrases</button>
                <div id="generatedPhrasesArea" style="display:none; background:rgba(10,20,45,0.8); border-radius:30px; padding:20px; margin:15px 0;">
                    <div id="generatedPhrasesList"></div>
                    <button id="startRecordingBtn">🎙️ Lire dernière phrase</button>
                    <div id="voiceResult"></div>
                </div>
                <div id="storyHistoryArea">
                    <h3>📜 Ton histoire :</h3>
                    <div id="storyFullHistory" style="background:rgba(10,20,45,0.7); border-radius:20px; padding:15px;"></div>
                    <button id="animateStoryBtn">🚀 Animer l'histoire</button>
                </div>
                <button id="resetStoryBtn">💫 Réinitialiser</button>
            </div>
        </div>
    </div>

    <!-- Dictée vocale (avec améliorations dys) -->
    <div id="dictee" class="tab-content">
        <div class="editor-container">
            <div class="zone">
                <div style="background:rgba(10,20,45,0.7); backdrop-filter:blur(8px); border-radius:30px; padding:15px;">
                    <h3>🎧 Dictée pour Méline</h3>
                    <div class="mouth-animation" id="mouthAnim"></div>
                    <div class="speed-control">
                        <span>🐢 Lente</span>
                        <input type="range" id="speedSlider" min="0.5" max="1.2" step="0.05" value="0.85">
                        <span>🐇 Rapide</span>
                    </div>
                    <div style="display:flex; gap:15px; justify-content:center; margin-top:15px; flex-wrap:wrap;">
                        <button id="newDictPhrase">🆕 Nouvelle phrase (lue)</button>
                        <button id="relistenDictPhrase">🔊 Réécouter</button>
                        <button id="slowReplay">🐢 Réécouter lentement</button>
                        <button id="stepByStepBtn">📝 Mode pas à pas</button>
                        <button id="checkDictAudio">✅ Vérifier + retour audio</button>
                        <button id="hintButton" class="hint-btn">💡 Indice</button>
                    </div>
                </div>
                <label>✏️ Écris ce que tu as entendu :</label>
                <textarea id="dictInput" rows="4" placeholder="Tape ici..."></textarea>
                <div id="coloredDictDisplay" class="colored-dict-output"></div>
                <div id="dictFeedback" style="margin-top:10px;"></div>
                <div id="hintBox" class="hint-box" style="display:none;"></div>
                <div id="stepByStepPanel" style="display:none; background:rgba(0,0,0,0.7); border-radius:20px; padding:15px; margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <!-- Progrès -->
    <div id="progres" class="tab-content">
        <div class="editor-container"><div class="zone">
            <h2>📈 Suivi de Méline</h2>
            <div id="stats"></div>
            <h3>📝 Mots à réviser (répétition espacée)</h3>
            <div id="hardWordsList"></div>
            <button id="resetHardWords">Réinitialiser liste</button>
            <button id="exportPDF">📄 Exporter pour l'orthophoniste (PDF)</button>
            <button id="resetProgress">Réinitialiser tous les progrès</button>
        </div></div>
    </div>

    <!-- Réglages -->
    <div id="settings" class="tab-content">
        <div class="editor-container"><div class="zone"><h2>⚙️ Personnalisation</h2>
            <label>Police : </label><select id="fontSelect"><option value="OpenDyslexic">OpenDyslexic</option><option value="Andika">Andika</option><option value="Lexend">Lexend</option><option value="Comic Neue">Comic Neue</option></select><br>
            <label>Espacement des lettres (px) : </label><input type="range" id="letterSpacing" min="0" max="5" step="0.5" value="1"><br>
            <label>Mode comparaison dictée : </label><select id="compareMode"><option value="strict">Strict</option><option value="tolérant">Tolérant</option></select><br>
            <button id="saveSettings">💾 Sauvegarder</button>
        </div></div>
    </div>

    <!-- Badges -->
    <div id="badges" class="tab-content">
        <div class="editor-container"><div class="zone"><h2>🏅 Mes badges spatiaux</h2>
            <div id="badgeCollection"></div>
            <p>Clique sur un badge pour le mettre en avant !</p>
        </div></div>
    </div>
    <footer>🌌 Thème spatial réaliste (vidéo NASA) • Toutes les aides pour dyslexie</footer>
</div>

<script>
    // ----- VARIABLES GLOBALES -----
    let synth = window.speechSynthesis;
    let currentPhrase = "";
    let stepByStepActive = false;
    let currentWordIndex = 0;
    let wordsArray = [];
    let hardWords = JSON.parse(localStorage.getItem('melinaHardWords') || '[]');
    let availableBadges = ["🚀 Fusée d'or","🏆 Étoile filante","🪐 Planète Saturne","🌠 Nébuleuse","👩‍🚀 Astronaute"];

    // ----- BIBLIOTHÈQUE DE PHRASES -----
    const allPhrases = [
        "Le chat dort.", "Le ciel est étoilé.", "Il fait beau sur Mars.", "Je mange une pomme.", "La fusée décolle.",
        "La nébuleuse est jolie.", "Papa lit un livre.", "Maman fait un gâteau.", "J'aime le chocolat.", "L'oiseau chante fort.",
        "Le vaisseau est rouge.", "Il y a du soleil.", "La mer est calme.", "Le poisson nage bien.", "Je joue au ballon.",
        "La lune brille la nuit.", "Mon ami est gentil.", "Le lion est fort.", "J'ai un joli stylo.", "Le train va vite."
    ];

    // ----- SYLLABATION -----
    function syllaberMot(mot) {
        let ponctuation = mot.match(/[.,!?;:…]+$/);
        let propre = ponctuation ? mot.slice(0, -ponctuation[0].length) : mot;
        if (!propre) return [mot];
        let voyelles = "aeiouyâàäéèêëôîïûùüÿ";
        let syllabes = [];
        let courant = "";
        for (let i = 0; i < propre.length; i++) {
            courant += propre[i];
            if (voyelles.includes(propre[i]) && i+1 < propre.length && !voyelles.includes(propre[i+1])) {
                syllabes.push(courant);
                courant = "";
            }
        }
        if (courant) syllabes.push(courant);
        if (ponctuation) syllabes[syllabes.length-1] += ponctuation[0];
        return syllabes;
    }

    function colorerTexte(texte) {
        return texte.split(/\r?\n/).map(ligne => ligne.split(/(\s+)/).map(elem => {
            if (elem.trim() === "") return elem;
            let syll = syllaberMot(elem);
            return syll.map((s,i) => `<span style="color:${i%2===0?'#7df9ff':'#ffb347'}">${s}</span>`).join('');
        }).join('')).join('\n');
    }

    // ----- ÉCRITURE LIBRE -----
    let modeColorie = false;
    let currentSize = 24;
    const inputText = document.getElementById('input-text');
    const outputDiv = document.getElementById('output-display');

    function updateDisplay() {
        let txt = inputText.value;
        if (modeColorie) outputDiv.innerHTML = colorerTexte(txt);
        else outputDiv.innerHTML = txt.replace(/\n/g,'<br>');
    }
    inputText.addEventListener('input', updateDisplay);
    window.colorerSyllabes = function() { modeColorie = true; updateDisplay(); };
    window.reinitialiserAffichage = function() { modeColorie = false; updateDisplay(); };
    window.changerTaille = function(delta) { currentSize += delta; if(currentSize<12) currentSize=12; if(currentSize>48) currentSize=48; inputText.style.fontSize = currentSize+'px'; outputDiv.style.fontSize = currentSize+'px'; };
    window.insererPhraseAleatoire = function() { inputText.value = allPhrases[Math.floor(Math.random()*allPhrases.length)]; updateDisplay(); };
    window.lireMotSelectionne = function() {
        let sel = window.getSelection().toString().trim();
        if(sel) {
            let u = new SpeechSynthesisUtterance(sel);
            u.lang = 'fr-FR';
            synth.speak(u);
        } else alert("Sélectionne un mot ou une phrase");
    };
    updateDisplay();

    // ----- HISTOIRE INTERACTIVE (inchangée) -----
    let fullStory = "";
    let currentGeneratedPhrases = [];
    let recognition = null;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.lang = 'fr-FR';
        recognition.continuous = false;
    }
    function genererPhrases(mots) {
        let motsList = mots.split(/[ ,]+/).filter(m=>m);
        if (!motsList.length) motsList = ["aventure"];
        return [
            `Un jour, ${motsList[0]} apparut dans le ciel.`,
            `Méline rencontra un ${motsList[1] || "ami"} mystérieux.`,
            `Ensemble, ils trouvèrent ${motsList[2] || "un trésor"} cosmique.`
        ];
    }
    document.getElementById('generateStoryBtn')?.addEventListener('click', () => {
        let kw = document.getElementById('storyKeywords').value;
        currentGeneratedPhrases = genererPhrases(kw);
        document.getElementById('generatedPhrasesList').innerHTML = currentGeneratedPhrases.map((p,i)=>`<p>${i+1}. ${p}</p>`).join('');
        document.getElementById('generatedPhrasesArea').style.display = "block";
    });
    document.getElementById('startRecordingBtn')?.addEventListener('click', () => {
        if (!recognition) { alert("Micro non supporté"); return; }
        let last = currentGeneratedPhrases[currentGeneratedPhrases.length-1];
        recognition.start();
        recognition.onresult = e => {
            let parole = e.results[0][0].transcript;
            if (parole.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase() === last.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase()) {
                fullStory += currentGeneratedPhrases.join(" ") + " ";
                document.getElementById('storyFullHistory').innerHTML = fullStory.replace(/\n/g,'<br>');
                document.getElementById('generatedPhrasesArea').style.display = "none";
                document.getElementById('voiceResult').innerHTML = "✅ Ajouté !";
                let prog = JSON.parse(localStorage.getItem('melinaProgress') || '{"histoiresCrees":0}');
                prog.histoiresCrees++;
                localStorage.setItem('melinaProgress', JSON.stringify(prog));
                updateStats();
            } else document.getElementById('voiceResult').innerHTML = "❌ Pas exact, réessaie.";
        };
    });
    document.getElementById('resetStoryBtn')?.addEventListener('click', () => {
        fullStory = "";
        document.getElementById('storyFullHistory').innerHTML = "";
        document.getElementById('generatedPhrasesArea').style.display = "none";
    });
    document.getElementById('animateStoryBtn')?.addEventListener('click', () => {
        if (!fullStory.trim()) return;
        let phrases = fullStory.match(/[^.!?]+[.!?]+/g) || [fullStory];
        let idx = 0;
        function next() {
            if (idx >= phrases.length) return;
            let u = new SpeechSynthesisUtterance(phrases[idx]);
            u.lang = 'fr-FR';
            u.onend = () => { idx++; setTimeout(next, 800); };
            synth.speak(u);
        }
        synth.cancel();
        next();
    });

    // ----- DICTÉE VOCALE (avec indices et mots difficiles) -----
    function lire(texte, speed = 0.85) {
        synth.cancel();
        let u = new SpeechSynthesisUtterance(texte);
        u.lang = 'fr-FR';
        u.rate = speed;
        let mouthParent = document.getElementById('mouthAnim')?.parentElement;
        if (mouthParent) mouthParent.classList.add('speaking');
        u.onend = () => { if (mouthParent) mouthParent.classList.remove('speaking'); };
        synth.speak(u);
    }

    function normalize(str, mode) {
        if (mode === 'tolérant') return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        return str;
    }

    function updateColoration() {
        let saisie = document.getElementById('dictInput').value;
        let mode = document.getElementById('compareMode').value;
        if (!currentPhrase) return;
        let html = "";
        for (let i = 0; i < saisie.length; i++) {
            let c = saisie[i];
            if (i < currentPhrase.length) {
                let ok = normalize(c, mode) === normalize(currentPhrase[i], mode);
                html += `<span class="${ok ? 'correct-char' : 'incorrect-char'}">${c}</span>`;
            } else html += `<span class="incorrect-char">${c}</span>`;
        }
        if (saisie.length < currentPhrase.length) html += ` <span style="opacity:0.5;">(il manque ${currentPhrase.length - saisie.length} caractères)</span>`;
        document.getElementById('coloredDictDisplay').innerHTML = html;
    }

    function ajouterMotDifficile(mot) {
        if (!hardWords.includes(mot)) {
            hardWords.push(mot);
            localStorage.setItem('melinaHardWords', JSON.stringify(hardWords));
            afficherMotsDifficiles();
        }
    }

    function extraireMotsErreurs(saisie, cible, mode) {
        let motsSaisie = saisie.split(/\s+/);
        let motsCible = cible.split(/\s+/);
        let erreurs = [];
        for (let i = 0; i < Math.min(motsSaisie.length, motsCible.length); i++) {
            if (normalize(motsSaisie[i], mode) !== normalize(motsCible[i], mode)) {
                erreurs.push(motsCible[i]);
            }
        }
        if (motsSaisie.length !== motsCible.length) {
            if (motsSaisie.length < motsCible.length) erreurs.push(...motsCible.slice(motsSaisie.length));
            else erreurs.push(...motsSaisie.slice(motsCible.length));
        }
        return [...new Set(erreurs)];
    }

    function genererIndice(saisie, cible, mode) {
        let indices = [];
        let ns = normalize(saisie, mode);
        let nc = normalize(cible, mode);
        if (ns === nc && saisie !== cible) {
            for (let i = 0; i < Math.min(saisie.length, cible.length); i++) {
                if (saisie[i] !== cible[i] && normalize(saisie[i], mode) === normalize(cible[i], mode)) {
                    indices.push(`À la position ${i+1}, tu as écrit "${saisie[i]}" mais il fallait "${cible[i]}". Vérifie les accents.`);
                    break;
                }
            }
            if (!indices.length) indices.push("Vérifie la ponctuation.");
        } else if (saisie.length < cible.length) {
            let i = 0;
            while (i < saisie.length && normalize(saisie[i], mode) === normalize(cible[i], mode)) i++;
            if (i < cible.length) indices.push(`Il manque le caractère "${cible[i]}" (position ${i+1}) après "${saisie.substring(0,i)}".`);
            else indices.push(`Il manque la fin : "${cible.substring(saisie.length)}".`);
        } else if (saisie.length > cible.length) {
            indices.push("Ta phrase est trop longue.");
        } else {
            let diff = [];
            for (let i = 0; i < saisie.length; i++) {
                if (normalize(saisie[i], mode) !== normalize(cible[i], mode))
                    diff.push(`"${saisie[i]}" au lieu de "${cible[i]}" (pos ${i+1})`);
            }
            if (diff.length) indices.push(`Erreurs : ${diff.join(", ")}.`);
            else indices.push("Vérifie espaces ou ponctuation.");
        }
        if (!indices.length) indices.push("Réécoute la phrase.");
        return indices[0];
    }

    function afficherIndice() {
        let saisie = document.getElementById('dictInput').value;
        if (!currentPhrase || !saisie.trim()) {
            document.getElementById('hintBox').innerHTML = "✏️ Écris d'abord quelque chose.";
            document.getElementById('hintBox').style.display = "block";
            return;
        }
        let mode = document.getElementById('compareMode').value;
        let indice = genererIndice(saisie, currentPhrase, mode);
        document.getElementById('hintBox').innerHTML = `💡 Indice : ${indice}`;
        document.getElementById('hintBox').style.display = "block";
    }

    function verifierAvecAudioEtIndices() {
        let saisie = document.getElementById('dictInput').value;
        let mode = document.getElementById('compareMode').value;
        if (normalize(saisie, mode) === normalize(currentPhrase, mode)) {
            let msg = "🎉 Parfait ! 🎉 Tu progresses !";
            document.getElementById('dictFeedback').innerHTML = msg;
            lire(`Bravo ! Tu as écrit : ${saisie}. La phrase était : ${currentPhrase}.`);
            let prog = JSON.parse(localStorage.getItem('melinaProgress') || '{"dictées":0}');
            prog.dictées++;
            localStorage.setItem('melinaProgress', JSON.stringify(prog));
            updateStats();
            document.getElementById('hintBox').style.display = "none";
            let badges = JSON.parse(localStorage.getItem('melinaBadges') || '[]');
            if (prog.dictées >= 5 && !badges.includes("🏆 Étoile filante")) badges.push("🏆 Étoile filante");
            if (prog.dictées >= 10 && !badges.includes("🪐 Planète")) badges.push("🪐 Planète");
            localStorage.setItem('melinaBadges', JSON.stringify(badges));
            afficherBadges();
        } else {
            let indice = genererIndice(saisie, currentPhrase, mode);
            document.getElementById('dictFeedback').innerHTML = `❌ ${indice} Réessaie !`;
            lire(`La phrase à écrire était : ${currentPhrase}. ${indice}`);
            document.getElementById('hintBox').innerHTML = `💡 ${indice}`;
            document.getElementById('hintBox').style.display = "block";
            let motsErreurs = extraireMotsErreurs(saisie, currentPhrase, mode);
            motsErreurs.forEach(mot => ajouterMotDifficile(mot));
        }
    }

    function nouvellePhrase() {
        currentPhrase = allPhrases[Math.floor(Math.random() * allPhrases.length)];
        let speed = parseFloat(document.getElementById('speedSlider').value);
        lire(currentPhrase, speed);
        document.getElementById('dictInput').value = "";
        document.getElementById('coloredDictDisplay').innerHTML = "";
        document.getElementById('dictFeedback').innerHTML = "";
        document.getElementById('hintBox').style.display = "none";
        stepByStepActive = false;
        document.getElementById('stepByStepPanel').style.display = "none";
    }

    function slowReplay() {
        if (currentPhrase) lire(currentPhrase, 0.55);
    }

    function stepByStepMode() {
        if (!currentPhrase) return;
        if (stepByStepActive) {
            document.getElementById('stepByStepPanel').style.display = "none";
            stepByStepActive = false;
        }
        stepByStepActive = true;
        wordsArray = currentPhrase.split(' ');
        currentWordIndex = 0;
        let panel = document.getElementById('stepByStepPanel');
        panel.style.display = "block";
        function updatePanel() {
            if (currentWordIndex < wordsArray.length) {
                panel.innerHTML = `<p>Mot ${currentWordIndex+1}/${wordsArray.length} : <strong>${wordsArray[currentWordIndex]}</strong></p>
                                    <button id="nextWordBtn">Suivant</button>
                                    <button id="cancelStepBtn">Annuler</button>`;
                document.getElementById('nextWordBtn').onclick = () => {
                    lire(wordsArray[currentWordIndex], 0.7);
                    currentWordIndex++;
                    if (currentWordIndex < wordsArray.length) updatePanel();
                    else {
                        panel.innerHTML = "<p>✅ Fin de la phrase ! Maintenant écris-la entièrement.</p><button id='closeStepPanel'>Fermer</button>";
                        document.getElementById('closeStepPanel').onclick = () => { panel.style.display = "none"; stepByStepActive = false; };
                    }
                };
                document.getElementById('cancelStepBtn').onclick = () => { panel.style.display = "none"; stepByStepActive = false; };
            }
        }
        updatePanel();
    }

    document.getElementById('newDictPhrase').addEventListener('click', nouvellePhrase);
    document.getElementById('relistenDictPhrase').addEventListener('click', () => { if (currentPhrase) lire(currentPhrase, parseFloat(document.getElementById('speedSlider').value)); });
    document.getElementById('slowReplay').addEventListener('click', slowReplay);
    document.getElementById('stepByStepBtn').addEventListener('click', stepByStepMode);
    document.getElementById('checkDictAudio').addEventListener('click', verifierAvecAudioEtIndices);
    document.getElementById('hintButton').addEventListener('click', afficherIndice);
    document.getElementById('dictInput').addEventListener('input', updateColoration);
    nouvellePhrase();

    // ----- SUGGESTIONS ORTHOGRAPHIQUES -----
    window.suggererCorrections = function() {
        let texte = inputText.value;
        let mots = texte.split(/\s+/);
        let dico = ["chat", "ciel", "bleu", "maison", "école", "maman", "papa", "fusée", "étoile", "planète"];
        let corrections = {};
        mots.forEach(mot => {
            let motClean = mot.toLowerCase().replace(/[.,!?;:]$/, '');
            if (!dico.includes(motClean) && motClean.length > 2) {
                let suggestion = dico.find(d => d.startsWith(motClean[0]) && Math.abs(d.length - motClean.length) <= 2);
                if (suggestion) corrections[mot] = suggestion;
            }
        });
        if (Object.keys(corrections).length) {
            let msg = "📝 Suggestions : " + Object.entries(corrections).map(([m,s])=>`${m} → ${s}`).join(", ");
            alert(msg);
            lire(msg);
        } else alert("Aucune suggestion pour l'instant.");
    };

    window.relectureGuidee = function() {
        let texte = inputText.value;
        if (!texte.trim()) return;
        let phrases = texte.split(/[.!?]+/);
        let idx = 0;
        function lirePhrase() {
            if (idx >= phrases.length) return;
            let u = new SpeechSynthesisUtterance(phrases[idx].trim() + ".");
            u.lang = 'fr-FR';
            u.rate = 0.8;
            u.onend = () => { idx++; setTimeout(lirePhrase, 1000); };
            synth.speak(u);
        }
        synth.cancel();
        lirePhrase();
    };

    // ----- MOTS DIFFICILES -----
    function afficherMotsDifficiles() {
        let div = document.getElementById('hardWordsList');
        if (!div) return;
        div.innerHTML = hardWords.map(w => `<span style="display:inline-block; margin:5px; padding:5px 10px; background:#1e2a4a; border-radius:20px;">${w} <button onclick="reviserMot('${w}')">🔊</button></span>`).join('');
    }
    window.reviserMot = function(mot) { lire(mot, 0.7); };
    document.getElementById('resetHardWords')?.addEventListener('click', () => {
        hardWords = [];
        localStorage.setItem('melinaHardWords', '[]');
        afficherMotsDifficiles();
    });
    afficherMotsDifficiles();

    // ----- BADGES -----
    function afficherBadges() {
        let owned = JSON.parse(localStorage.getItem('melinaBadges') || '[]');
        let container = document.getElementById('badgeCollection');
        if (container) {
            container.innerHTML = availableBadges.map(b => `<div class="badge ${owned.includes(b) ? 'selected' : ''}" onclick="toggleBadge('${b}')">${b}</div>`).join('');
        }
    }
    window.toggleBadge = function(badge) {
        let owned = JSON.parse(localStorage.getItem('melinaBadges') || '[]');
        if (owned.includes(badge)) owned = owned.filter(b => b !== badge);
        else owned.push(badge);
        localStorage.setItem('melinaBadges', JSON.stringify(owned));
        afficherBadges();
    };
    afficherBadges();

    // ----- PROGRÈS -----
    function updateStats() {
        let prog = JSON.parse(localStorage.getItem('melinaProgress') || '{"dictées":0, "histoiresCrees":0}');
        let statsDiv = document.getElementById('stats');
        if (statsDiv) statsDiv.innerHTML = `🎤 Dictées réussies : ${prog.dictées}<br>📖 Histoires créées : ${prog.histoiresCrees}`;
    }
    document.getElementById('resetProgress')?.addEventListener('click', () => {
        localStorage.setItem('melinaProgress', JSON.stringify({dictées: 0, histoiresCrees: 0}));
        updateStats();
    });
    document.getElementById('exportPDF')?.addEventListener('click', () => {
        let prog = JSON.parse(localStorage.getItem('melinaProgress') || '{"dictées":0,"histoiresCrees":0}');
        let hard = hardWords.join(', ');
        let content = `Rapport pour Méline\n\nDictées réussies : ${prog.dictées}\nHistoires créées : ${prog.histoiresCrees}\nMots à réviser : ${hard}\nDate : ${new Date().toLocaleDateString()}`;
        let win = window.open();
        win.document.write(`<html><head><title>Progrès Méline</title></head><body><pre>${content}</pre></body></html>`);
        win.print();
    });
    updateStats();

    // ----- RÉGLAGES (police, espacement) -----
    function applySettings() {
        let font = document.getElementById('fontSelect').value;
        let fontFamily = font === 'OpenDyslexic' ? "'OpenDyslexic', sans-serif" : font === 'Andika' ? "'Andika', sans-serif" : font === 'Lexend' ? "'Lexend', sans-serif" : "'Comic Neue', cursive";
        document.body.style.fontFamily = fontFamily;
        let spacing = document.getElementById('letterSpacing').value;
        document.body.style.letterSpacing = spacing + 'px';
        localStorage.setItem('melinaFont', font);
        localStorage.setItem('melinaSpacing', spacing);
    }
    document.getElementById('saveSettings').addEventListener('click', applySettings);
    let savedFont = localStorage.getItem('melinaFont');
    if (savedFont) document.getElementById('fontSelect').value = savedFont;
    let savedSpacing = localStorage.getItem('melinaSpacing');
    if (savedSpacing) document.getElementById('letterSpacing').value = savedSpacing;
    applySettings();

    // ----- SYLLABATION À LA DEMANDE (clic) -----
    outputDiv.addEventListener('click', (e) => {
        let selection = window.getSelection().toString().trim();
        if (selection) {
            let u = new SpeechSynthesisUtterance(selection);
            u.lang = 'fr-FR';
            u.rate = 0.7;
            synth.speak(u);
        }
    });
    document.getElementById('coloredDictDisplay')?.addEventListener('click', () => {
        let selection = window.getSelection().toString().trim();
        if (selection) lire(selection, 0.7);
    });

    // ----- ONGLETS -----
    const tabs = document.querySelectorAll('.tab-button');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            let id = btn.getAttribute('data-tab');
            contents.forEach(c => c.classList.remove('active'));
            tabs.forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        });
    });

    // ----- OVERLAY RÉALISTE (étoiles filantes et planètes discrètes) -----
    const overlayCanvas = document.getElementById('overlay-canvas');
    const overlayCtx = overlayCanvas.getContext('2d');
    let overlayWidth, overlayHeight;
    function resizeOverlay() {
        overlayWidth = window.innerWidth;
        overlayHeight = window.innerHeight;
        overlayCanvas.width = overlayWidth;
        overlayCanvas.height = overlayHeight;
    }
    window.addEventListener('resize', resizeOverlay);
    resizeOverlay();

    let shootingStarsOverlay = [];
    let planetsOverlay = [];

    // Création de quelques planètes statiques très réalistes (cercles avec halos)
    for (let i = 0; i < 3; i++) {
        planetsOverlay.push({
            x: Math.random() * overlayWidth,
            y: Math.random() * overlayHeight,
            radius: Math.random() * 30 + 15,
            color: `hsla(${Math.random() * 60 + 20}, 80%, 60%, 0.4)`,
            blur: Math.random() * 8 + 4
        });
    }

    function addShootingStar() {
        shootingStarsOverlay.push({
            x: Math.random() * overlayWidth,
            y: Math.random() * overlayHeight * 0.3,
            length: Math.random() * 120 + 80,
            speedX: Math.random() * 8 + 4,
            speedY: Math.random() * 6 + 2,
            alpha: 1,
            width: Math.random() * 3 + 1
        });
    }
    setInterval(() => { if (Math.random() < 0.3) addShootingStar(); }, 4000);

    function drawOverlay() {
        overlayCtx.clearRect(0, 0, overlayWidth, overlayHeight);
        // Planètes floues (réalistes)
        planetsOverlay.forEach(p => {
            overlayCtx.shadowBlur = p.blur;
            overlayCtx.shadowColor = "rgba(255,255,200,0.3)";
            overlayCtx.fillStyle = p.color;
            overlayCtx.beginPath();
            overlayCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            overlayCtx.fill();
            // Anneau pour certaines
            if (p.radius > 25) {
                overlayCtx.beginPath();
                overlayCtx.ellipse(p.x, p.y, p.radius * 1.4, p.radius * 0.6, 0.2, 0, Math.PI * 2);
                overlayCtx.fillStyle = "rgba(255,215,0,0.2)";
                overlayCtx.fill();
            }
        });
        overlayCtx.shadowBlur = 0;
        // Étoiles filantes
        for (let i = shootingStarsOverlay.length-1; i >= 0; i--) {
            let s = shootingStarsOverlay[i];
            overlayCtx.beginPath();
            overlayCtx.moveTo(s.x, s.y);
            overlayCtx.lineTo(s.x - s.length, s.y - s.length * 0.5);
            overlayCtx.strokeStyle = `rgba(255, 240, 200, ${s.alpha})`;
            overlayCtx.lineWidth = s.width;
            overlayCtx.stroke();
            overlayCtx.fillStyle = `rgba(255, 255, 210, ${s.alpha})`;
            overlayCtx.beginPath();
            overlayCtx.arc(s.x, s.y, 3, 0, Math.PI * 2);
            overlayCtx.fill();
            s.x += s.speedX;
            s.y += s.speedY;
            s.alpha -= 0.01;
            if (s.alpha <= 0 || s.x > overlayWidth + 200 || s.y > overlayHeight + 200) shootingStarsOverlay.splice(i,1);
        }
        requestAnimationFrame(drawOverlay);
    }
    drawOverlay();
    window.addEventListener('resize', () => {
        resizeOverlay();
        planetsOverlay.forEach(p => {
            p.x = Math.random() * overlayWidth;
            p.y = Math.random() * overlayHeight;
        });
    });
</script>
</body>
