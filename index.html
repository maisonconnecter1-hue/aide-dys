<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Espace Écriture - Méline (univers animé)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.3/dist/opendyslexic.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'OpenDyslexic', sans-serif;
            background: radial-gradient(ellipse at top, #0a0f2c 0%, #030617 100%);
            color: #f0f3ff;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        /* Couche de fond avec canvas pour animations complexes */
        #universe-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }
        .app-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Onglets */
        .tabs {
            display: flex;
            background: rgba(5,10,30,0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding: 0 20px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-button {
            background: rgba(0,0,0,0.5);
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            color: #c9e9ff;
            cursor: pointer;
            border-radius: 30px 30px 15px 15px;
            transition: 0.3s;
        }
        .tab-button.active {
            background: #2c3e66;
            color: #ffecb3;
            border-bottom: 3px solid #f1c40f;
            box-shadow: 0 0 12px rgba(241,196,15,0.5);
        }
        .tab-content { display: none; flex-grow: 1; padding: 20px; overflow-y: auto; }
        .tab-content.active { display: flex; flex-direction: column; }
        .toolbar {
            padding: 15px 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            border-top: 1px solid rgba(255,255,200,0.2);
        }
        .editor-container { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; align-items: center; padding: 20px; }
        .zone { width: 85%; max-width: 1000px; }
        textarea, .dict-input {
            width: 100%;
            font-size: 24px;
            font-family: inherit;
            padding: 20px;
            border: 2px solid #4ecdc4;
            border-radius: 30px;
            line-height: 1.6;
            background: rgba(15,25,55,0.85);
            color: #f5f9ff;
            resize: vertical;
        }
        button {
            padding: 10px 24px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #2c3e66, #1a2745);
            color: white;
            font-family: inherit;
            font-weight: bold;
            transition: 0.2s;
            border: 1px solid rgba(255,215,0,0.4);
        }
        button:hover { transform: scale(1.02); background: linear-gradient(135deg, #3e5a8f, #2a3b60); box-shadow: 0 0 12px gold; }
        .correct-char { color: #2ecc71; background-color: rgba(46,204,113,0.2); }
        .incorrect-char { color: #e74c3c; background-color: rgba(231,76,60,0.2); }
        .colored-dict-output { background: rgba(10,20,45,0.9); border-radius: 30px; padding: 20px; font-size: 28px; line-height: 1.8; white-space: pre-wrap; border: 1px solid #4ecdc4; margin-top: 10px; }
        footer { text-align: center; font-size: 14px; padding: 8px; background: rgba(0,0,0,0.5); border-top: 1px solid #2c3e66; position: relative; z-index: 10; }
    </style>
</head>
<body>
<canvas id="universe-canvas"></canvas>
<div class="app-container">
    <div class="tabs">
        <button class="tab-button active" data-tab="ecriture">🚀 Écriture libre</button>
        <button class="tab-button" data-tab="histoire">🌌 Histoire interactive</button>
        <button class="tab-button" data-tab="dictee">🛸 Dictée vocale</button>
        <button class="tab-button" data-tab="progres">📊 Mes progrès</button>
        <button class="tab-button" data-tab="settings">⚙️ Réglages</button>
    </div>

    <!-- Onglet Écriture libre -->
    <div id="ecriture" class="tab-content active">
        <div class="editor-container">
            <div class="zone"><textarea id="input-text" placeholder="Écris ton histoire, Méline..."></textarea></div>
            <div class="zone"><div id="output-display" style="min-height:120px; background:rgba(10,20,45,0.9); border-radius:30px; padding:20px;"></div></div>
            <div class="toolbar">
                <button onclick="insererPhraseAleatoire()">🌟 Phrase au hasard</button>
                <button onclick="colorerSyllabes()">🎨 Colorer syllabes</button>
                <button onclick="lireMotSelectionne()">🔊 Lire mot sélectionné</button>
                <button onclick="changerTaille(2)">🔭 Agrandir</button>
                <button onclick="changerTaille(-2)">🔭 Réduire</button>
                <button onclick="reinitialiserAffichage()">🪐 Texte brut</button>
            </div>
        </div>
    </div>

    <!-- Onglet Histoire -->
    <div id="histoire" class="tab-content">
        <div class="editor-container">
            <div class="zone">
                <button id="genStoryBtn">🌠 Générer une histoire (3 phrases)</button>
                <button id="resetStoryBtn">💫 Réinitialiser</button>
                <div id="storyOutput" style="background:rgba(10,20,45,0.9); border-radius:30px; padding:20px; margin-top:15px;"></div>
            </div>
        </div>
    </div>

    <!-- Onglet Dictée -->
    <div id="dictee" class="tab-content">
        <div class="editor-container">
            <div class="zone">
                <div style="background:#0a1430; border-radius:30px; padding:15px; text-align:center;">
                    <h3>🎧 Dictée pour Méline</h3>
                    <div style="display:flex; gap:15px; justify-content:center; margin-top:15px;">
                        <button id="newDictPhrase">🆕 Nouvelle phrase (lue)</button>
                        <button id="relistenDictPhrase">🔊 Réécouter</button>
                        <button id="checkDictAudio">✅ Vérifier + retour audio</button>
                    </div>
                </div>
                <label>✏️ Écris ce que tu as entendu :</label>
                <textarea id="dictInput" rows="4" placeholder="Tape ici..."></textarea>
                <div id="coloredDictDisplay" class="colored-dict-output"></div>
                <div id="dictFeedback" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <!-- Onglet Progrès -->
    <div id="progres" class="tab-content">
        <div class="editor-container"><div class="zone"><h2>📈 Suivi de Méline</h2><div id="stats"></div><button id="resetProgress">Réinitialiser les progrès</button></div></div>
    </div>

    <!-- Onglet Réglages -->
    <div id="settings" class="tab-content">
        <div class="editor-container"><div class="zone"><h2>⚙️ Personnalisation</h2>
            <label>Police : </label><select id="fontSelect"><option value="OpenDyslexic">OpenDyslexic</option><option value="Lexend">Lexend</option><option value="Comic Neue">Comic Neue</option></select><br>
            <label>Mode comparaison dictée : </label><select id="compareMode"><option value="strict">Strict (accents/majuscules)</option><option value="tolérant">Tolérant (ignore accents/casse)</option></select><br>
            <button id="saveSettings">💾 Sauvegarder</button>
        </div></div>
    </div>
    <footer>🌙 Univers animé : étoiles filantes, planètes, constellations, navettes, nébuleuses ✨</footer>
</div>

<script>
    // ========== FONCTIONS DE BASE ==========
    const allPhrases = [
        "Le chat dort.", "Le ciel est étoilé.", "Il fait beau sur Mars.", "Je mange une pomme.", "La fusée décolle.",
        "La nébuleuse est jolie.", "Papa lit un livre.", "Maman fait un gâteau.", "J'aime le chocolat.", "L'oiseau chante fort.",
        "Le vaisseau est rouge.", "Il y a du soleil.", "La mer est calme.", "Le poisson nage bien.", "Je joue au ballon.",
        "La lune brille la nuit.", "Mon ami est gentil.", "Le lion est fort.", "J'ai un joli stylo.", "Le train va vite."
    ];

    function syllaberMot(mot) {
        let ponctuation = mot.match(/[.,!?;:…]+$/);
        let propre = ponctuation ? mot.slice(0, -ponctuation[0].length) : mot;
        if (!propre) return [mot];
        let voyelles = "aeiouyâàäéèêëôîïûùüÿ";
        let syllabes = [];
        let courant = "";
        for (let i=0; i<propre.length; i++) {
            courant += propre[i];
            if (voyelles.includes(propre[i]) && i+1 < propre.length && !voyelles.includes(propre[i+1])) {
                syllabes.push(courant);
                courant = "";
            }
        }
        if (courant) syllabes.push(courant);
        if (ponctuation) syllabes[syllabes.length-1] += ponctuation[0];
        return syllabes;
    }
    function colorerTexte(texte) {
        return texte.split(/\r?\n/).map(ligne => ligne.split(/(\s+)/).map(elem => {
            if (elem.trim() === "") return elem;
            let syll = syllaberMot(elem);
            return syll.map((s,i) => `<span style="color:${i%2===0?'#7df9ff':'#ffb347'}">${s}</span>`).join('');
        }).join('')).join('\n');
    }

    // Écriture libre
    let modeColorie = false;
    let currentSize = 24;
    const inputText = document.getElementById('input-text');
    const outputDiv = document.getElementById('output-display');
    function updateDisplay() {
        let txt = inputText.value;
        if (modeColorie) outputDiv.innerHTML = colorerTexte(txt);
        else outputDiv.innerHTML = txt.replace(/\n/g,'<br>');
    }
    inputText.addEventListener('input', updateDisplay);
    window.colorerSyllabes = function() { modeColorie = true; updateDisplay(); };
    window.reinitialiserAffichage = function() { modeColorie = false; updateDisplay(); };
    window.changerTaille = function(delta) { currentSize += delta; if(currentSize<12) currentSize=12; if(currentSize>48) currentSize=48; inputText.style.fontSize = currentSize+'px'; outputDiv.style.fontSize = currentSize+'px'; };
    window.insererPhraseAleatoire = function() { inputText.value = allPhrases[Math.floor(Math.random()*allPhrases.length)]; updateDisplay(); };
    window.lireMotSelectionne = function() { let sel = window.getSelection().toString().trim(); if(sel) { let u = new SpeechSynthesisUtterance(sel); u.lang='fr-FR'; speechSynthesis.speak(u); } else alert("Sélectionne un mot ou une phrase"); };
    updateDisplay();

    // Histoire
    let storyHtml = "";
    document.getElementById('genStoryBtn').addEventListener('click', () => {
        let phrases = [
            "Un jour, Méline partit explorer la galaxie.",
            "Elle rencontra un petit robot qui avait perdu sa mémoire.",
            "Ensemble, ils réparèrent la fusée et devinrent amis."
        ];
        storyHtml += phrases.join(" ") + " ";
        document.getElementById('storyOutput').innerHTML = storyHtml.replace(/\n/g,'<br>');
    });
    document.getElementById('resetStoryBtn').addEventListener('click', () => { storyHtml = ""; document.getElementById('storyOutput').innerHTML = ""; });

    // Dictée
    let currentPhrase = "";
    let synth = window.speechSynthesis;
    function lire(texte) { synth.cancel(); let u = new SpeechSynthesisUtterance(texte); u.lang='fr-FR'; u.rate=0.85; synth.speak(u); }
    function normalize(str, mode) { if(mode==='tolérant') return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase(); return str; }
    function updateColoration() {
        let saisie = document.getElementById('dictInput').value;
        let mode = document.getElementById('compareMode').value;
        if (!currentPhrase) return;
        let html = "";
        for(let i=0; i<saisie.length; i++) {
            let c = saisie[i];
            if(i < currentPhrase.length) {
                let ok = normalize(c, mode) === normalize(currentPhrase[i], mode);
                html += `<span class="${ok ? 'correct-char' : 'incorrect-char'}">${c}</span>`;
            } else html += `<span class="incorrect-char">${c}</span>`;
        }
        if(saisie.length < currentPhrase.length) html += ` <span style="opacity:0.5;">(il manque ${currentPhrase.length - saisie.length} lettres)</span>`;
        document.getElementById('coloredDictDisplay').innerHTML = html;
    }
    function nouvellePhrase() {
        currentPhrase = allPhrases[Math.floor(Math.random()*allPhrases.length)];
        lire(currentPhrase);
        document.getElementById('dictInput').value = "";
        document.getElementById('coloredDictDisplay').innerHTML = "";
        document.getElementById('dictFeedback').innerHTML = "";
    }
    function verifierAvecAudio() {
        let saisie = document.getElementById('dictInput').value;
        let mode = document.getElementById('compareMode').value;
        if(normalize(saisie, mode) === normalize(currentPhrase, mode)) {
            document.getElementById('dictFeedback').innerHTML = "🎉 Parfait ! 🎉";
            lire(`Bravo ! Tu as écrit : ${saisie}. La phrase était : ${currentPhrase}.`);
        } else {
            document.getElementById('dictFeedback').innerHTML = "❌ Ce n'est pas encore exact. Réécoute et réessaie.";
            lire(`La phrase à écrire était : ${currentPhrase}. Réessaie.`);
        }
    }
    document.getElementById('newDictPhrase').addEventListener('click', nouvellePhrase);
    document.getElementById('relistenDictPhrase').addEventListener('click', () => { if(currentPhrase) lire(currentPhrase); });
    document.getElementById('checkDictAudio').addEventListener('click', verifierAvecAudio);
    document.getElementById('dictInput').addEventListener('input', updateColoration);
    nouvellePhrase();

    // Progrès
    let stats = { dictées: 0 };
    function updateStats() { document.getElementById('stats').innerHTML = `🎤 Dictées réussies : ${stats.dictées}`; }
    document.getElementById('resetProgress').addEventListener('click', () => { stats.dictées = 0; updateStats(); });
    updateStats();

    // Réglages
    function applySettings() {
        let font = document.getElementById('fontSelect').value;
        document.body.style.fontFamily = font === 'OpenDyslexic' ? "'OpenDyslexic', sans-serif" : font === 'Lexend' ? "'Lexend', sans-serif" : "'Comic Neue', cursive";
        localStorage.setItem('melinaFont', font);
    }
    document.getElementById('saveSettings').addEventListener('click', applySettings);
    let savedFont = localStorage.getItem('melinaFont');
    if(savedFont) { document.getElementById('fontSelect').value = savedFont; applySettings(); }

    // Onglets
    const tabs = document.querySelectorAll('.tab-button');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            contents.forEach(c => c.classList.remove('active'));
            tabs.forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        });
    });

    // ========== ANIMATIONS SPATIALES AVANCÉES (Canvas) ==========
    const canvas = document.getElementById('universe-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let stars = [];
    let shootingStars = [];
    let planets = [];
    let shuttles = [];
    let nebulae = [];
    let constellations = [];

    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Étoiles fixes
    for (let i = 0; i < 300; i++) {
        stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2 + 1,
            alpha: Math.random() * 0.5 + 0.2,
            twinkle: Math.random() * Math.PI * 2
        });
    }

    // Planètes (grandes, lentes)
    for (let i = 0; i < 5; i++) {
        planets.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 30 + 10,
            color: `hsl(${Math.random() * 60 + 20}, 70%, 50%)`,
            speedX: (Math.random() - 0.5) * 0.2,
            speedY: (Math.random() - 0.5) * 0.1,
            angle: Math.random() * Math.PI * 2
        });
    }

    // Constellations (points reliés)
    const starGroups = [
        [{x:0.2, y:0.1}, {x:0.3, y:0.15}, {x:0.25, y:0.25}, {x:0.15, y:0.2}],
        [{x:0.7, y:0.6}, {x:0.8, y:0.55}, {x:0.85, y:0.65}, {x:0.75, y:0.7}],
        [{x:0.4, y:0.8}, {x:0.5, y:0.75}, {x:0.55, y:0.85}]
    ];
    starGroups.forEach(group => {
        let points = group.map(p => ({ x: p.x * width, y: p.y * height }));
        constellations.push(points);
    });

    // Nébuleuses (cercles flous)
    for (let i = 0; i < 3; i++) {
        nebulae.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 200 + 100,
            hue: Math.random() * 360,
            alpha: 0.1
        });
    }

    // Étoiles filantes
    function addShootingStar() {
        shootingStars.push({
            x: Math.random() * width,
            y: Math.random() * height * 0.3,
            length: Math.random() * 80 + 40,
            speedX: (Math.random() - 0.5) * 8 + 4,
            speedY: (Math.random() - 0.5) * 6 + 3,
            alpha: 1,
            tail: []
        });
    }
    setInterval(() => { if (Math.random() < 0.3) addShootingStar(); }, 3000);

    // Navettes spatiales
    for (let i = 0; i < 2; i++) {
        shuttles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            speedX: (Math.random() - 0.5) * 1.5,
            speedY: (Math.random() - 0.5) * 1,
            angle: 0,
            size: 20
        });
    }

    function drawNebula(n) {
        let grad = ctx.createRadialGradient(n.x, n.y, 10, n.x, n.y, n.radius);
        grad.addColorStop(0, `hsla(${n.hue}, 80%, 60%, ${n.alpha})`);
        grad.addColorStop(1, `hsla(${n.hue}, 80%, 30%, 0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawConstellation(points) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,215,0,0.3)';
        ctx.lineWidth = 1;
        for (let i = 0; i < points.length - 1; i++) {
            ctx.moveTo(points[i].x, points[i].y);
            ctx.lineTo(points[i+1].x, points[i+1].y);
            ctx.stroke();
        }
        points.forEach(p => {
            ctx.fillStyle = 'rgba(255,215,0,0.6)';
            ctx.beginPath();
            ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
            ctx.fill();
        });
    }

    function drawShuttle(s) {
        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.rotate(Math.atan2(s.speedY, s.speedX));
        ctx.fillStyle = '#e67e22';
        ctx.beginPath();
        ctx.moveTo(0, -s.size/2);
        ctx.lineTo(s.size, 0);
        ctx.lineTo(0, s.size/2);
        ctx.fill();
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.rect(-s.size/3, -s.size/4, s.size/2, s.size/2);
        ctx.fill();
        ctx.restore();
    }

    function animate() {
        ctx.clearRect(0, 0, width, height);
        // Nébuleuses
        nebulae.forEach(drawNebula);
        // Étoiles fixes
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255,255,255,${s.alpha + Math.sin(Date.now() * 0.002 + s.twinkle) * 0.1})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
            ctx.fill();
        });
        // Constellations
        constellations.forEach(drawConstellation);
        // Planètes
        planets.forEach(p => {
            p.x += p.speedX;
            p.y += p.speedY;
            if (p.x < -100) p.x = width + 100;
            if (p.x > width + 100) p.x = -100;
            if (p.y < -100) p.y = height + 100;
            if (p.y > height + 100) p.y = -100;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
            ctx.fill();
            // Anneau pour certaines
            if (p.radius > 20) {
                ctx.strokeStyle = 'rgba(255,255,200,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, p.radius*1.3, p.radius*0.8, 0, 0, Math.PI*2);
                ctx.stroke();
            }
        });
        // Étoiles filantes
        for (let i=shootingStars.length-1; i>=0; i--) {
            let s = shootingStars[i];
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x - s.length, s.y - s.length * 0.6);
            ctx.strokeStyle = `rgba(255,255,200,${s.alpha})`;
            ctx.lineWidth = 2;
            ctx.stroke();
            s.x += s.speedX;
            s.y += s.speedY;
            s.alpha -= 0.02;
            if (s.alpha <= 0 || s.x > width + 200 || s.y > height + 200) shootingStars.splice(i,1);
        }
        // Navettes
        shuttles.forEach(s => {
            s.x += s.speedX;
            s.y += s.speedY;
            if (s.x < -50) s.x = width + 50;
            if (s.x > width + 50) s.x = -50;
            if (s.y < -50) s.y = height + 50;
            if (s.y > height + 50) s.y = -50;
            drawShuttle(s);
        });
        requestAnimationFrame(animate);
    }
    animate();
    // Ajuster les positions des constellations au redimensionnement
    window.addEventListener('resize', () => {
        resizeCanvas();
        constellations = starGroups.map(group => group.map(p => ({ x: p.x * width, y: p.y * height })));
        // Replacer étoiles, planètes proportionnellement
        stars.forEach(s => { s.x = Math.random() * width; s.y = Math.random() * height; });
        planets.forEach(p => { p.x = Math.random() * width; p.y = Math.random() * height; });
        nebulae.forEach(n => { n.x = Math.random() * width; n.y = Math.random() * height; });
    });
</script>
</body>
</html>
